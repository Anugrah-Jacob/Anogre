<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 — Page Not Found | Anogre</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; background: #020617; color: #f8fafc; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .glow { text-shadow: 0 0 80px rgba(99,102,241,0.3); }
    </style>
</head>
<body>
    <div class="text-center px-6">
        <h1 class="text-[10rem] md:text-[14rem] font-extrabold leading-none glow bg-gradient-to-b from-indigo-400 to-slate-700 bg-clip-text text-transparent select-none">404</h1>
        <p class="text-xl md:text-2xl font-semibold text-slate-400 mb-4 -mt-6">This page doesn't exist</p>
        <p class="text-slate-500 max-w-md mx-auto mb-10 leading-relaxed">The page you're looking for may have been moved, deleted, or never existed in the first place.</p>
        <a href="/" class="inline-flex items-center gap-2 bg-indigo-600 hover:bg-indigo-500 text-white font-semibold px-8 py-4 rounded-xl transition-all duration-300 text-sm uppercase tracking-widest">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M10 19l-7-7m0 0l7-7m-7 7h18"/></svg>
            Back to Home
        </a>
    </div>
</body>
</html>
